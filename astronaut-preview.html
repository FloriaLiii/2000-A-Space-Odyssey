<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇航员导航样式预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1225;
      color: #e8e8ec;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
      color: #f37043;
    }
    .subtitle {
      text-align: center;
      color: #9c6b80;
      margin-bottom: 50px;
      font-size: 14px;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .option-card {
      background: #2e2232;
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
    }
    .option-card:hover {
      border-color: #f37043;
      box-shadow: 0 0 20px rgba(243, 112, 67, 0.2);
      transform: translateY(-4px);
    }
    .option-label {
      position: absolute;
      top: 12px;
      left: 16px;
      background: #f37043;
      color: white;
      font-weight: bold;
      font-size: 14px;
      padding: 2px 10px;
      border-radius: 8px;
    }
    .option-card h3 {
      margin-top: 8px;
      margin-bottom: 8px;
      font-size: 18px;
      color: #cca4ae;
    }
    .option-card p {
      font-size: 12px;
      color: #9c6b80;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .preview-area {
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: radial-gradient(ellipse at center, rgba(46, 34, 50, 0.8), #1a1225);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    /* 模拟导航点 */
    .fake-nav {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .fake-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(204, 164, 174, 0.3);
      border: 2px solid transparent;
    }
    .fake-dot.active {
      background: #f37043;
      border-color: #f37043;
      box-shadow: 0 0 12px rgba(243, 112, 67, 0.5);
      transform: scale(1.3);
    }
    /* 星星背景 */
    .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; opacity: 0.5; }

    /* === 方案 A: Q版站立 === */
    .astro-a {
      width: 44px; height: 50px;
      position: absolute;
      right: 42px;
      top: 50%;
      margin-top: -41px;
      animation: float-a 3s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(243, 112, 67, 0.4));
      transform: rotate(-15deg);
    }
    @keyframes float-a {
      0%, 100% { transform: rotate(-15deg) translate(0, 0); }
      25% { transform: rotate(-12deg) translate(-3px, -2px); }
      50% { transform: rotate(-18deg) translate(1px, -4px); }
      75% { transform: rotate(-13deg) translate(-2px, -1px); }
    }

    /* === 方案 B: 太空漂浮 === */
    .astro-b {
      width: 52px; height: 52px;
      position: absolute;
      right: 40px;
      top: 50%;
      margin-top: -42px;
      animation: float-b 4s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(243, 112, 67, 0.4));
    }
    @keyframes float-b {
      0%, 100% { transform: rotate(0deg) translate(0, 0); }
      25% { transform: rotate(8deg) translate(-5px, -6px); }
      50% { transform: rotate(-5deg) translate(3px, -10px); }
      75% { transform: rotate(3deg) translate(-3px, -3px); }
    }

    /* === 方案 C: 火箭骑手 === */
    .astro-c {
      width: 55px; height: 55px;
      position: absolute;
      right: 38px;
      top: 50%;
      margin-top: -44px;
      animation: float-c 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 8px rgba(243, 112, 67, 0.5));
    }
    @keyframes float-c {
      0%, 100% { transform: translate(0, 0) rotate(-30deg); }
      50% { transform: translate(-2px, -6px) rotate(-25deg); }
    }
    .flame {
      animation: flame-flicker 0.3s ease-in-out infinite alternate;
    }
    @keyframes flame-flicker {
      0% { opacity: 0.8; transform: scaleY(1); }
      100% { opacity: 1; transform: scaleY(1.15); }
    }

    /* === 方案 D: 极简头盔 === */
    .astro-d {
      width: 32px; height: 32px;
      position: absolute;
      right: 44px;
      top: 50%;
      margin-top: -32px;
      animation: float-d 3s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(243, 112, 67, 0.35));
    }
    @keyframes float-d {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-2px, -3px) scale(1.05); }
    }
    .visor-glow {
      animation: visor-pulse 2s ease-in-out infinite;
    }
    @keyframes visor-pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }

    /* === 方案 E: 太空猫 === */
    .astro-e {
      width: 44px; height: 50px;
      position: absolute;
      right: 42px;
      top: 50%;
      margin-top: -41px;
      animation: float-e 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(243, 112, 67, 0.4));
    }
    @keyframes float-e {
      0%, 100% { transform: rotate(-5deg) translate(0, 0); }
      25% { transform: rotate(-2deg) translate(-3px, -4px); }
      50% { transform: rotate(-8deg) translate(1px, -6px); }
      75% { transform: rotate(-3deg) translate(-2px, -2px); }
    }
    .tail-wag {
      animation: wag 1s ease-in-out infinite alternate;
      transform-origin: 68px 75px;
    }
    @keyframes wag {
      0% { transform: rotate(-15deg); }
      100% { transform: rotate(15deg); }
    }
  </style>
</head>
<body>
  <h1>选择你的导航宇航员</h1>
  <p class="subtitle">以下是五种不同风格的小宇航员，点击你喜欢的方案告诉我</p>

  <div class="options">

    <!-- 方案 A -->
    <div class="option-card">
      <span class="option-label">A</span>
      <div class="preview-area">
        <div class="star" style="top:20%;left:15%"></div>
        <div class="star" style="top:60%;left:30%"></div>
        <div class="star" style="top:35%;left:70%"></div>
        <div class="star" style="top:80%;left:50%"></div>
        <div class="fake-nav">
          <div class="fake-dot"></div>
          <div class="fake-dot active"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
        </div>
        <svg class="astro-a" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="60" cy="75" rx="28" ry="35" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <circle cx="60" cy="38" r="26" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <circle cx="60" cy="38" r="18" fill="#3d2754" opacity="0.9"/>
          <ellipse cx="53" cy="33" rx="5" ry="7" fill="rgba(255,255,255,0.15)" transform="rotate(-15 53 33)"/>
          <line x1="60" y1="12" x2="60" y2="4" stroke="#c0bfc5" stroke-width="2" stroke-linecap="round"/>
          <circle cx="60" cy="3" r="3" fill="#f37043"/>
          <rect x="30" y="58" width="10" height="22" rx="4" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
          <path d="M33 68 Q15 62 18 82 Q20 92 28 88" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <circle cx="26" cy="88" r="5" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <path d="M88 68 Q105 58 104 78 Q103 90 94 86" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <circle cx="94" cy="86" r="5" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <rect x="36" y="88" width="48" height="6" rx="3" fill="#9c6b80"/>
          <path d="M45 105 Q40 118 38 128" fill="none" stroke="#e8e8ec" stroke-width="10" stroke-linecap="round"/>
          <ellipse cx="36" cy="131" rx="8" ry="5" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
          <path d="M75 105 Q82 116 86 126" fill="none" stroke="#e8e8ec" stroke-width="10" stroke-linecap="round"/>
          <ellipse cx="88" cy="129" rx="8" ry="5" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
        </svg>
      </div>
      <h3>Q版站立宇航员</h3>
      <p>简洁站立姿态，微微倾斜<br>缓慢浮动，带橙色发光</p>
    </div>

    <!-- 方案 B -->
    <div class="option-card">
      <span class="option-label">B</span>
      <div class="preview-area">
        <div class="star" style="top:25%;left:20%"></div>
        <div class="star" style="top:55%;left:45%"></div>
        <div class="star" style="top:40%;left:65%"></div>
        <div class="star" style="top:75%;left:35%"></div>
        <div class="fake-nav">
          <div class="fake-dot"></div>
          <div class="fake-dot active"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
        </div>
        <svg class="astro-b" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
          <!-- 身体 -->
          <ellipse cx="70" cy="72" rx="24" ry="28" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <!-- 头盔 -->
          <circle cx="70" cy="40" r="24" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <!-- 面罩 -->
          <circle cx="70" cy="40" r="16" fill="#3d2754" opacity="0.9"/>
          <!-- 反光 -->
          <ellipse cx="64" cy="36" rx="4" ry="6" fill="rgba(255,255,255,0.15)" transform="rotate(-15 64 36)"/>
          <!-- 感叹号表情 -->
          <line x1="70" y1="34" x2="70" y2="42" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="70" cy="46" r="1.2" fill="rgba(255,255,255,0.5)"/>
          <!-- 天线 -->
          <line x1="70" y1="16" x2="75" y2="6" stroke="#c0bfc5" stroke-width="2" stroke-linecap="round"/>
          <circle cx="76" cy="5" r="3" fill="#f37043"/>
          <!-- 背包 -->
          <rect x="90" y="55" width="12" height="20" rx="5" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
          <!-- 左臂张开 -->
          <path d="M48 60 Q30 45 22 55 Q18 62 26 66" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <circle cx="25" cy="64" r="5" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <!-- 右臂张开 -->
          <path d="M92 58 Q108 48 115 56 Q118 62 112 66" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <circle cx="112" cy="64" r="5" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <!-- 腰带 -->
          <rect x="50" y="84" width="40" height="5" rx="2.5" fill="#9c6b80"/>
          <!-- 左腿张开 -->
          <path d="M56 95 Q42 110 35 122" fill="none" stroke="#e8e8ec" stroke-width="9" stroke-linecap="round"/>
          <ellipse cx="33" cy="124" rx="7" ry="5" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
          <!-- 右腿张开 -->
          <path d="M84 95 Q96 110 104 120" fill="none" stroke="#e8e8ec" stroke-width="9" stroke-linecap="round"/>
          <ellipse cx="106" cy="122" rx="7" ry="5" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
        </svg>
      </div>
      <h3>太空漂浮宇航员</h3>
      <p>手脚张开漂浮姿态，大幅浮动<br>像在太空中自由翱翔</p>
    </div>

    <!-- 方案 C -->
    <div class="option-card">
      <span class="option-label">C</span>
      <div class="preview-area">
        <div class="star" style="top:18%;left:25%"></div>
        <div class="star" style="top:65%;left:40%"></div>
        <div class="star" style="top:30%;left:55%"></div>
        <div class="star" style="top:85%;left:60%"></div>
        <div class="fake-nav">
          <div class="fake-dot"></div>
          <div class="fake-dot active"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
        </div>
        <svg class="astro-c" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
          <!-- 火箭 -->
          <g transform="translate(55, 60) rotate(30)">
            <!-- 火箭身体 -->
            <ellipse cx="0" cy="0" rx="10" ry="25" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
            <!-- 火箭头 -->
            <path d="M-8 -20 Q0 -38 8 -20" fill="#f37043"/>
            <!-- 窗口 -->
            <circle cx="0" cy="-8" r="5" fill="#3d2754" opacity="0.8"/>
            <ellipse cx="-2" cy="-10" rx="1.5" ry="2" fill="rgba(255,255,255,0.2)"/>
            <!-- 尾翼 -->
            <path d="M-10 18 L-18 28 L-8 22" fill="#9c6b80"/>
            <path d="M10 18 L18 28 L8 22" fill="#9c6b80"/>
            <!-- 火焰 -->
            <g class="flame" transform="translate(0, 25)">
              <path d="M-7 0 Q-3 12 0 18 Q3 12 7 0" fill="#f37043" opacity="0.9"/>
              <path d="M-4 0 Q-1 10 0 14 Q1 10 4 0" fill="#fa9a1e" opacity="0.8"/>
              <path d="M-2 0 Q0 8 0 10 Q0 8 2 0" fill="#ffe066" opacity="0.7"/>
            </g>
          </g>
          <!-- 宇航员骑在上面 -->
          <g transform="translate(48, 18)">
            <!-- 身体 -->
            <ellipse cx="22" cy="30" rx="14" ry="16" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
            <!-- 头 -->
            <circle cx="22" cy="12" r="14" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
            <circle cx="22" cy="12" r="10" fill="#3d2754" opacity="0.9"/>
            <ellipse cx="19" cy="9" rx="3" ry="4" fill="rgba(255,255,255,0.15)" transform="rotate(-10 19 9)"/>
            <!-- 天线 -->
            <line x1="22" y1="-2" x2="26" y2="-8" stroke="#c0bfc5" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="27" cy="-9" r="2.5" fill="#f37043"/>
            <!-- 手臂抓火箭 -->
            <path d="M10 28 Q2 32 5 38" fill="none" stroke="#e8e8ec" stroke-width="5" stroke-linecap="round"/>
            <path d="M34 26 Q40 30 38 36" fill="none" stroke="#e8e8ec" stroke-width="5" stroke-linecap="round"/>
            <!-- 腿 -->
            <path d="M16 42 Q10 50 8 54" fill="none" stroke="#e8e8ec" stroke-width="5" stroke-linecap="round"/>
            <path d="M28 42 Q34 50 36 54" fill="none" stroke="#e8e8ec" stroke-width="5" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <h3>火箭骑手</h3>
      <p>骑着小火箭飞行<br>尾部带火焰闪烁效果</p>
    </div>

    <!-- 方案 D -->
    <div class="option-card">
      <span class="option-label">D</span>
      <div class="preview-area">
        <div class="star" style="top:22%;left:18%"></div>
        <div class="star" style="top:58%;left:42%"></div>
        <div class="star" style="top:38%;left:72%"></div>
        <div class="star" style="top:78%;left:28%"></div>
        <div class="fake-nav">
          <div class="fake-dot"></div>
          <div class="fake-dot active"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
        </div>
        <svg class="astro-d" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <!-- 头盔外壳 -->
          <circle cx="40" cy="42" r="30" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2.5"/>
          <!-- 面罩 -->
          <circle cx="40" cy="42" r="22" fill="#3d2754" opacity="0.9"/>
          <!-- 面罩反光 -->
          <ellipse cx="32" cy="36" rx="6" ry="9" fill="rgba(255,255,255,0.12)" transform="rotate(-15 32 36)"/>
          <!-- 呼吸灯光 -->
          <circle class="visor-glow" cx="40" cy="42" r="22" fill="rgba(243,112,67,0.15)"/>
          <!-- 天线 -->
          <line x1="40" y1="12" x2="40" y2="3" stroke="#c0bfc5" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="40" cy="2" r="3.5" fill="#f37043"/>
          <!-- 耳机装饰 -->
          <circle cx="12" cy="45" r="6" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
          <circle cx="68" cy="45" r="6" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1.5"/>
        </svg>
      </div>
      <h3>极简宇航员头盔</h3>
      <p>只有头盔，体积小巧精致<br>面罩有呼吸灯微光效果</p>
    </div>

    <!-- 方案 E -->
    <div class="option-card">
      <span class="option-label">E</span>
      <div class="preview-area">
        <div class="star" style="top:20%;left:30%"></div>
        <div class="star" style="top:50%;left:50%"></div>
        <div class="star" style="top:70%;left:20%"></div>
        <div class="star" style="top:40%;left:75%"></div>
        <div class="fake-nav">
          <div class="fake-dot"></div>
          <div class="fake-dot active"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
          <div class="fake-dot"></div>
        </div>
        <svg class="astro-e" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
          <!-- 身体 -->
          <ellipse cx="60" cy="78" rx="24" ry="30" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <!-- 头盔 -->
          <circle cx="60" cy="42" r="24" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="2"/>
          <!-- 猫耳朵（在头盔外） -->
          <path d="M40 24 L36 8 L50 20" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <path d="M80 24 L84 8 L70 20" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <!-- 内耳 -->
          <path d="M42 22 L39 12 L49 21" fill="#cca4ae" opacity="0.5"/>
          <path d="M78 22 L81 12 L71 21" fill="#cca4ae" opacity="0.5"/>
          <!-- 面罩 -->
          <circle cx="60" cy="42" r="16" fill="#3d2754" opacity="0.9"/>
          <!-- 猫眼 -->
          <ellipse cx="53" cy="40" rx="3" ry="4" fill="rgba(250,154,30,0.7)"/>
          <ellipse cx="67" cy="40" rx="3" ry="4" fill="rgba(250,154,30,0.7)"/>
          <!-- 猫瞳孔 -->
          <ellipse cx="53" cy="40" rx="1.2" ry="3.5" fill="rgba(0,0,0,0.8)"/>
          <ellipse cx="67" cy="40" rx="1.2" ry="3.5" fill="rgba(0,0,0,0.8)"/>
          <!-- 小鼻子 -->
          <path d="M58 46 L60 48 L62 46" fill="#cca4ae" opacity="0.6"/>
          <!-- 天线 -->
          <line x1="60" y1="18" x2="60" y2="8" stroke="#c0bfc5" stroke-width="2" stroke-linecap="round"/>
          <circle cx="60" cy="7" r="3" fill="#f37043"/>
          <!-- 腰带 -->
          <rect x="40" y="90" width="40" height="5" rx="2.5" fill="#9c6b80"/>
          <!-- 爪子/手 -->
          <path d="M38 72 Q22 65 20 78 Q19 86 28 84" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <circle cx="27" cy="83" r="4" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1"/>
          <path d="M82 70 Q96 62 100 76 Q101 86 92 82" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1.5"/>
          <circle cx="93" cy="82" r="4" fill="#e8e8ec" stroke="#c0bfc5" stroke-width="1"/>
          <!-- 腿 -->
          <path d="M48 104 Q42 116 40 124" fill="none" stroke="#e8e8ec" stroke-width="8" stroke-linecap="round"/>
          <ellipse cx="38" cy="126" rx="7" ry="4" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1"/>
          <path d="M72 104 Q78 116 80 124" fill="none" stroke="#e8e8ec" stroke-width="8" stroke-linecap="round"/>
          <ellipse cx="82" cy="126" rx="7" ry="4" fill="#d0d0d5" stroke="#b0afb5" stroke-width="1"/>
          <!-- 尾巴 -->
          <g class="tail-wag">
            <path d="M84 88 Q100 80 105 68 Q108 60 100 58" fill="none" stroke="#e8e8ec" stroke-width="5" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <h3>太空猫</h3>
      <p>穿宇航服的小猫咪<br>尾巴摇摆，猫眼闪闪</p>
    </div>

  </div>
</body>
</html>
